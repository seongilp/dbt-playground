# dbt 문서(lineage 그래프 포함)를 GitHub Pages로 자동 배포.
# main에 push될 때마다 dbt docs를 새로 빌드해 게시.
name: docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"

      - name: Install dbt-duckdb
        run: |
          uv venv
          uv pip install dbt-duckdb

      # 빌드 후 docs 생성(--static: 단일 self-contained HTML)
      - name: dbt build + docs generate
        run: |
          uv run dbt build --profiles-dir .
          uv run dbt docs generate --static --profiles-dir .

      - name: Prepare site
        run: |
          mkdir -p site
          cp target/static_index.html site/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
