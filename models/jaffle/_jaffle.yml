version: 2

models:
  - name: stg_customers
    columns:
      - name: customer_id
        data_tests: [unique, not_null]
  - name: stg_orders
    columns:
      - name: order_id
        data_tests: [unique, not_null]
      - name: status
        data_tests:
          - accepted_values:
              values: ['placed', 'shipped', 'completed', 'return_pending', 'returned']
  - name: stg_payments
    columns:
      - name: payment_id
        data_tests: [unique, not_null]
  - name: mart_customer_orders
    description: "고객별 주문 수 + 총 결제액"
    columns:
      - name: customer_id
        data_tests: [unique, not_null]
